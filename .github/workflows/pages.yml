name: pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlantUML and Graphviz
        run: sudo apt-get update && sudo apt-get install -y plantuml graphviz

      - name: Install MkDocs dependencies
        run: python -m pip install --upgrade pip && pip install -r site/requirements.txt

      - name: Refresh traceability + compliance + dashboard
        run: |
          python3 tools/traceability-cli/traceability_cli.py status --refresh || true
          python3 tools/traceability-cli/traceability_cli.py compliance --refresh || true
          python3 scripts/render_project_dashboard.py || true

      - name: Build static site
        env:
          PLANTUML_MODE: cli
        run: python3 site/scripts/build_site.py --build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
