name: pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      plantuml-server:
        image: docker.io/plantuml/plantuml-server:jetty
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install site tooling
        run: uv sync --group site --no-default-groups

      - name: Refresh traceability + compliance + dashboard
        run: |
          python3 tools/traceability-cli/traceability_cli.py status --refresh || true
          python3 tools/traceability-cli/traceability_cli.py compliance --refresh || true
          python3 scripts/render_project_dashboard.py || true

      - name: Build static site
        env:
          PLANTUML_SERVER_URL: http://127.0.0.1:8080
        run: uv run --group site --no-default-groups statellite-site build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_generated

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
