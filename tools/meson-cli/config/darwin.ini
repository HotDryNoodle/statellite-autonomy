# macOS 本地编译配置 - Meson 原生格式
[binaries]
c = 'clang'
cpp = 'clang++'
ar = 'ar'
strip = 'strip'
pkg-config = 'pkg-config'

[built-in options]
buildtype = 'debugoptimized'
c_args = ['-fPIC', '-mmacosx-version-min=10.15']
cpp_args = ['-fPIC', '-mmacosx-version-min=10.15']
c_link_args = ['-framework', 'Foundation']
cpp_link_args = ['-framework', 'Foundation']

[project options]
spdlog_mode = 'shared'
