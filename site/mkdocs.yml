site_name: 卫星自主插件工程
site_description: 合同驱动的卫星自主工程工作区 — 面向仓库内开发者的只读项目视图。
site_url: ""
repo_url: https://github.com/hotdry/statellite-autonomy-plugin
repo_name: statellite-autonomy-plugin
edit_uri: ""

docs_dir: build/docs
site_dir: build/site
use_directory_urls: true
strict: true

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.share
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换至浅色模式
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - attr_list
  - def_list
  - tables
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  generator: false

# Nav 由 site/scripts/build_site.py 在 staging 阶段追加写入本文件的下方。
