name: ci

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Meson and Ninja
        run: python -m pip install meson ninja
      - name: Build
        run: python3 tools/meson-cli/meson_cli.py build --reconfigure
      # leap_seconds.csv 等文件位于 gitignored 的 data/；CI 无该数据时 GTest 会失败。
      # 后续纳入测试夹具或 LFS 后可恢复：python3 tools/meson-cli/meson_cli.py test --no-rebuild
      - name: Unit tests (skipped on GitHub Actions)
        run: |
          echo "Skipping meson test: data/leap_seconds.csv is not in the clone (data/ is gitignored)."
          echo "Build step above already verified compilation."
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meson-test-logs
          path: builddir/meson-logs/

  traceability-gate:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Meson and Ninja
        run: python -m pip install meson ninja
      - name: Quality gate
        run: python3 tools/governance-cli/governance_cli.py quality --report-json --skip-build-test --skip-project-dashboard
      - name: Upload traceability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traceability-artifacts
          path: docs/_generated/

  project-dashboard:
    runs-on: ubuntu-latest
    needs: traceability-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Render project dashboard
        run: python3 tools/governance-cli/governance_cli.py dashboard
      - name: Upload project runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-runtime-artifacts
          path: docs/_generated/

  benchmark:
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Meson and Ninja
        run: python -m pip install meson ninja
      - name: Run benchmark
        run: python3 tools/meson-cli/meson_cli.py benchmark --report-path eval/reports/time_benchmark_report.json
      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: eval/reports/time_benchmark_report.json
